<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>canvas</title>
</head>
<body>
    
    <canvas></canvas>

<script>
    const canvas = document.querySelector('canvas')
    const ctx = canvas.getContext('2d')

    canvas.width = window.innerWidth
    canvas.height = window.innerHeight

    //원 10개를 담을 배열

    let circles = []

    for(let i=0; i<10; i++){
        circles.push({
            //객체는 키:키값 mame:'홍길동', age:20,
            x : Math.random()*canvas.width,
            y : Math.random()*canvas.height,
            r : 20 + Math.random()*40, //비눗방울느낌이나도록작은크기20큰크기40으로키움(20~60)//시작값(최소) + Math.random() * 범위(더할 크기)
            // [수정] 0에 가까운 속도가 나와서 위아래로만 움직이는
            speedX : -3 + Math.random()*8,
            speedY : -3 + Math.random()*8,
            hue : Math.random()*360
            //hsl(색상(0~360),채도(%),밝기(%))
        })
    }   

        function ani(){

            ctx.clearRect(0,0,canvas.width,canvas.height)

            //10개의좌표를바꿔주는
            for(let i=0; i<circles.length; i++){

               //원의정보가져오기 
               let circle = circles[i]

               //좌표변경
               circle.x += circle.speedX
               circle.y += circle.speedY

               //오른쪽,왼쪽 벽 충돌
               if(circle.x + circle.r > canvas.width || circle.x - circle.r < 0){
                 circle.speedX = circle.speedX * -1 //반대방향으로가라
               }

               // 위,아래 벽 충돌 
               if(circle.y + circle.r > canvas.height || circle.y - circle.r < 0){
                 circle.speedY = circle.speedY * -1 //반대방향으로가라
               }
              
               //원그리기
               ctx.beginPath();
               ctx.arc(circle.x,circle.y,circle.r,0,Math.PI*2)
               ctx.fill()

               // [추가] 입체감과 투명함을 위한 방사형 그라데이션 만들기

               // 투명한 비눗방울 몸통 그리기
               ctx.beginPath();
               ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI*2)

               // 테두리 중심의 방사형 그라데이션 (가운데는 투명하게)
               let bodyGradient = ctx.createRadialGradient(
                   circle.x, circle.y, circle.r * 0.4, // 안쪽 원 영역 (투명 구간)
                   circle.x, circle.y, circle.r        // 바깥쪽 테두리 영역
               );
               
               bodyGradient.addColorStop(0, `hsla(${circle.hue}, 80%, 70%, 0.05)`); // 중심은 거의 투명
               bodyGradient.addColorStop(0.85, `hsla(${circle.hue}, 90%, 60%, 0.25)`); // 몸통 반투명
               bodyGradient.addColorStop(1, `hsla(${circle.hue}, 100%, 50%, 0.7)`); // 테두리는 선명하게
               
               ctx.fillStyle = bodyGradient;
               ctx.fill();

               // 원 영역 안에 '화이트 그라데이션'만 겹쳐 칠합니다.
               ctx.beginPath();
               ctx.arc(circle.x, circle.y, circle.r, 0, Math.PI*2);

               // 하얀 빛의 중심(시작점)을 정중앙에서 왼쪽 위 가장자리 끝(-0.45배)으로 바짝 밀어냈습니다!
               // 그리고 마지막 인자인 빛이 퍼지는 영역(반지름)을 원래 비눗방울 반지름의 1.1배로 확 키웠습니다.
               let lightGradient = ctx.createRadialGradient(
                   circle.x - circle.r * 0.45, circle.y - circle.r * 0.45, 0,            // 빛의 쨍한 시작점
                   circle.x - circle.r * 0.45, circle.y - circle.r * 0.45, circle.r * 1.1   // 빛이 번져나가는 크기
               );

               lightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.85)');   // 가장자리는 선명하고 밝은 화이트
               lightGradient.addColorStop(0.2, 'rgba(255, 255, 255, 0.4)');  // 중간 영역은 은은하게 퍼짐
               lightGradient.addColorStop(0.6, 'rgba(255, 255, 255, 0)');    // 비눗방울 중심으로 갈수록 완전히 투명해짐

               ctx.fillStyle = lightGradient;
               ctx.fill();
            }

            //for문안에넣으면10번중복호출이되기때문에
            requestAnimationFrame(ani);
        }
        ani()
        
        //브라우저크기변경대응설정
        window.addEventListener('resize',function(){
            canvas.width = window.innerWidth
            canvas.height = window.innerHeight
        })
</script>
</body>
</html>
