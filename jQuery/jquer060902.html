<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simmons img fadeIn,fadeOut</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../reset.css">
    <style>

        /* 헤더 전체 컨테이너 */
        .header {
            width: 100%;
            margin: 0 auto;
            padding: 20px 19%;
        }

        /* 상단 바 정렬 (로고 & 우측 유틸 메뉴) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* 로고 스타일 (Serif 글꼴 적용) */
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 28px; 
            width: auto;
            object-fit: contain;
        }

        /* 유틸리티 메뉴 스타일 */
        .util-menu {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .util-menu a {
            font-size: 12px;
            font-weight: 500;
        }

        /* 2. 하단 메인 메뉴 바 */
        .main-nav ul {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .main-nav a {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        /* 세로 구분선 (|) 공통 스타일 */
        .divider {
            font-size: 11px;
            color: #ccc;
            pointer-events: none; 
        }

        /* 양옆으로 꽉 찬 슬라이더 전체 컨테이너 */
        .wrap {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            margin: 20px auto; 
            position: relative;
            background-color: #000; /* 이미지 교체 시 배경 겹침 완화 */
        }
        .slide {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            display: none;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 화면 비율에 깨지지 않고 꽉 차게 채워집니다 */
        }
        /* 첫 번째 슬라이드만 기본 노출 */
        .slide:first-child {
            display: block;
        }

        /* 좌우 버튼 */
        .arrow {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(255,255,255,0.4);
            border: none;
            font-size: 20px;
            font-weight: bold;
            position: absolute;
            top: 50%; 
            transform: translateY(-50%);
            z-index: 10;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .arrow:hover {
            background-color: rgba(255,255,255,0.8);
        }
        .prev { left: 40px; }
        .next { right: 40px; }

        /* 일직선 막대기 바 영역 */
        .dotWrap {
            display: flex;
            gap: 10px;
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .dot {
            width: 40px;  /* 일직선 막대의 기본 가로 길이 */
            height: 3px; /* 일직선 막대의 두께 */
            background-color: white;
            opacity: 0.4;
            transition: all 0.4s;
            cursor: pointer;
        }
        /* 활성화된 완벽한 일직선 바 스타일 */
        .dot.on {
            opacity: 1;
            width: 60px; /* 활성화 시 부드럽게 바가 길어지는 세련된 연출 */
        }
    </style>
</head>
<body>

    <header class="header">
        <!-- 상단 라인: 로고 및 유틸리티 메뉴 -->
        <div class="top-bar">
            <h1 class="logo">
                <a href="#"><img src="../img/simmonslogo.png" alt="SIMMONS"></a>
            </h1>
            <nav class="util-menu">
                <a href="#">매장 안내</a>
                <a href="#">팩토리움 투어 예약</a>
                <span class="divider">|</span>
                <a href="#">회원가입</a>
                <a href="#">로그인</a>
                <a href="#">고객센터</a>
            </nav>
        </div>

        <!-- 하단 라인: 메인 내비게이션 바 -->
        <nav class="main-nav">
            <ul>
                <li><a href="#">브랜드 소개</a></li>
                <li class="divider">|</li>
                <li><a href="#">전체보기</a></li>
                <li><a href="#">뷰티레스트 블랙</a></li>
                <li><a href="#">뷰티레스트 매트리스</a></li>
                <li><a href="#">프레임</a></li>
                <li><a href="#">협탁</a></li>
                <li><a href="#">파운데이션</a></li>
                <li><a href="#">펫 매트리스</a></li>
                <li><a href="#">베딩</a></li>
                <li><a href="#">프래그런스</a></li>
                <li><a href="#">가구</a></li>
                <li><a href="#">아울렛</a></li>
            </ul>
        </nav>
    </header>

    <div class="wrap">
        <div class="slide">
            <img src="../img/simmons1.jpg" alt="img1" />
        </div>
        <div class="slide">
            <img src="../img/simmons2.jpg" alt="img2" />
        </div>
        <div class="slide">
            <img src="../img/simmons3.jpg" alt="img3" />
        </div>
        <div class="slide">
            <img src="../img/simmons4.jpg" alt="img4" />
        </div>
        <div class="slide">
            <img src="../img/simmons5.jpg" alt="img5" />
        </div>

        <!-- 좌우버튼 -->
        <button class="arrow prev">&lt;</button>
        <button class="arrow next">&gt;</button>

        <!-- 일직선 바 목록 -->
        <div class="dotWrap">
            <div class="dot on"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
      const slides = $('.slide'); //치는게귀찮으니깐변수로만들것
      const dots = $('.dot');

      let index = 0;
      let slideInterval;

      //공통적으로쓰이는슬라이드이동함수
      function moveSlide(){
          slides.stop(true,true).fadeOut(1000)
          //stop()::현재진행중인애니멈춤
          //stop(true)::현재대기중인애니삭제
          //stop(true,true)::대기중인애니삭제,선재진행중인애니삭제
          slides.eq(index).stop(true,true).fadeIn(1000)

          dots.removeClass('on')
          dots.eq(index).addClass('on')
      }

      // 자동 재생을 시작하는 함수 
      function autoSlide(){
        slideInterval = setInterval(function(){
            index++
            if(index >= slides.length){
                index = 0
            }
            moveSlide();
        },3000)
      }

        //다음버튼클릭시
        $('.next').on('click',function(){
            clearInterval(slideInterval)
            index++
            if(index >= slides.length){
                index = 0
            }
            moveSlide();
            autoSlide();
        })

        //이전버튼클릭시
        $('.prev').on('click',function(){
            clearInterval(slideInterval)
            index--
            if(index < slides.length){
                index = slides.length -1 //slides.levgth::총3개라서 
                //2->1->0->2
            }
            moveSlide();
            autoSlide();
        })
        
        //도튼을클릭시
        dots.on('click',function(){
            clearInterval(slideInterval)
            index = $(this).index()
            moveSlide()
            autoSlide();
        })

        //페이지가 로드되자마자 자동으로 슬라이드가 돌도록 최초 실행!
        autoSlide();

    </script>
</body>
</html>
